# Qdrant vector database cho RAG (Buổi 5).
#
#   docker compose up -d        # khởi động Qdrant nền
#   docker compose down         # dừng
#
# Sau khi chạy, đặt trong .env:  QDRANT_URL=http://localhost:6333
# Dashboard: http://localhost:6333/dashboard
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: legal-qdrant
    ports:
      - "6333:6333"   # REST API + dashboard
      - "6334:6334"   # gRPC
    volumes:
      - ./data/qdrant:/qdrant/storage   # persist dữ liệu qua các lần restart
    restart: unless-stopped
